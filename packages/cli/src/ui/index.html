<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kagura Local Dashboard</title>
  <style>
    :root {
      --bg: #09090b;
      --card: #18181b;
      --border: #27272a;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --primary: #ef4444; /* Kagura Red */
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .red-gate { color: var(--primary); }
    main {
      padding: 2rem;
      max-w: 1200px;
      margin: 0 auto;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .run-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .run-item {
      display: flex;
      justify-content: space-between;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(255,255,255,0.02);
      cursor: pointer;
    }
    .run-item:hover { background: rgba(255,255,255,0.05); }
    .status-badge {
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-completed { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
    .status-failed { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    #detail-view { display: none; }
    .back-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 0; margin-bottom: 1rem; font-size: 0.875rem;
    }
    .back-btn:hover { color: var(--text); }
  </style>
</head>
<body>
  <header>
    <h1><span class="red-gate">⛩</span> Kagura Local</h1>
  </header>
  
  <main>
    <div id="list-view">
      <h2 style="margin-top:0">Recent Local Traces</h2>
      <p style="color: var(--text-muted); margin-bottom: 2rem;">Viewing test results from ~/.kagura/state</p>
      <div class="run-list" id="runs-container">
        <!-- populated via JS -->
      </div>
    </div>

    <div id="detail-view">
      <button class="back-btn" onclick="showList()">← Back to list</button>
      <div class="card" id="detail-card">
        <!-- populated via JS -->
      </div>
    </div>
  </main>

  <script>
    async function loadRuns() {
      try {
        const res = await fetch('/api/runs');
        const runs = await res.json();
        
        const container = document.getElementById('runs-container');
        if (runs.length === 0) {
          container.innerHTML = '<p style="color:var(--text-muted)">No local traces found. Run a test first!</p>';
          return;
        }

        container.innerHTML = runs.map(run => `
          <div class="run-item" onclick="viewRun('${run.id}')">
            <div>
              <div style="font-weight: 500; margin-bottom: 0.25rem;">${run.id}</div>
              <div style="font-size: 0.875rem; color: var(--text-muted)">${new Date(run.timestamp).toLocaleString()}</div>
            </div>
            <div style="display:flex; align-items:center;">
              <span class="status-badge status-${run.status || 'completed'}">${run.status || 'Completed'}</span>
            </div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('runs-container').innerHTML = '<p style="color:#f87171">Failed to load traces.</p>';
      }
    }

    async function viewRun(id) {
      document.getElementById('list-view').style.display = 'none';
      document.getElementById('detail-view').style.display = 'block';
      const card = document.getElementById('detail-card');
      card.innerHTML = '<p>Loading trace data...</p>';

      try {
        const res = await fetch(`/api/runs/${id}`);
        const data = await res.json();
        
        card.innerHTML = `
          <h2 style="margin-top:0; font-family: monospace;">${id}</h2>
          <pre style="background: rgba(0,0,0,0.5); padding: 1rem; border-radius: 4px; overflow-x: auto; font-size: 0.875rem;">
${JSON.stringify(data, null, 2)}
          </pre>
        `;
      } catch (e) {
        card.innerHTML = '<p style="color:#f87171">Failed to load trace details.</p>';
      }
    }

    function showList() {
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('list-view').style.display = 'block';
    }

    loadRuns();
  </script>
</body>
</html>
